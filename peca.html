<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Peça</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: black;
  color: white;
}

.hero img {
  width: 100%;
  height: 80vh;
  object-fit: cover;
}

.container {
  max-width: 800px;
  margin: 80px auto;
}

button {
  background: white;
  color: black;
  padding: 12px;
  border: none;
}
</style>

</head>
<body>

<div class="hero">
  <img id="img">
</div>

<div class="container">
  <h1 id="nome"></h1>
  <p id="historia"></p>
  <button onclick="pedir()">Solicitar peça</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

const id = new URLSearchParams(window.location.search).get("id");

const docRef = doc(db, "pecas", id);
const snap = await getDoc(docRef);

const p = snap.data();

img.src = p.imagem;
nome.innerText = p.nome;
historia.innerText = p.historia;

window.pedir = async () => {

  const user = auth.currentUser;

  if (!user) return alert("Faz login");

  await addDoc(collection(db, "pedidos"), {
    user: user.email,
    peça: p.nome,
    data: new Date()
  });

  alert("Pedido enviado");
};

</script>

  
</body>
</html>
