<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Peça</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: black;
  color: white;
}

.hero img {
  width: 100%;
  height: 80vh;
  object-fit: cover;
}

.container {
  max-width: 800px;
  margin: 80px auto;
}

button {
  background: white;
  color: black;
  padding: 12px;
  border: none;
}
</style>

</head>
<body>

<div class="hero">
  <img id="img">
</div>

<div class="container">
  <h1 id="nome"></h1>
  <p id="historia"></p>
  <button onclick="pedir()">Solicitar peça</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AQUI_API_KEY",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const pecas = {
  phantom: {
    nome: "Phantom Black",
    imagem: "https://images.unsplash.com/photo-1523275335684-37898b6baf30",
    historia: "Ele deixou de ajustar-se ao mundo."
  },
  silver: {
    nome: "Silver Steel",
    imagem: "https://images.unsplash.com/photo-1524592094714-0f0654e20314",
    historia: "O controlo não nasce. Aprende-se."
  }
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const p = pecas[id];

document.getElementById("img").src = p.imagem;
document.getElementById("nome").innerText = p.nome;
document.getElementById("historia").innerText = p.historia;

window.pedir = async () => {

  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro");
    return;
  }

  await addDoc(collection(db, "pedidos"), {
    user: user.email,
    peça: p.nome,
    data: new Date()
  });

  alert("Pedido enviado.");
};

</script>

</body>
</html>
