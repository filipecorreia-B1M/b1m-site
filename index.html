<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Minha Loja</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .produto {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      background: #25D366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1ebe5d;
    }
  </style>
</head>
<body>

<h1>🛒 Minha Loja</h1>

<div class="produto">
  <h2>Produto 1</h2>
  <p>Preço: 20€</p>
  <button onclick="comprar('Produto 1')">Comprar</button>
</div>

<div class="produto">
  <h2>Produto 2</h2>
  <p>Preço: 35€</p>
  <button onclick="comprar('Produto 2')">Comprar</button>
</div>

<script>
function comprar(produto) {
  const numero = "351969673701"; // mete o teu número
  const mensagem = `Olá, quero comprar ${produto}`;
  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
