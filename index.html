<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>B1M Watches</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: gold;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      background: gold;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .produto {
      border: 1px solid #444;
      padding: 20px;
      margin: 20px;
    }
  </style>
</head>
<body>

  <h1>B1M Watches</h1>

  <h2>Login / Registo</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar conta</button>

  <h2>Loja</h2>

  <div class="produto">
    <h3>Relógio B1M Classic</h3>
    <p>Preço: 99€</p>
    <button onclick="comprar('B1M Classic', 99)">Comprar</button>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <script>
    // 🔥 METE AQUI OS TEUS DADOS DO FIREBASE
    const firebaseConfig = {
      apiKey: "COLOCA_AQUI",
      authDomain: "COLOCA_AQUI",
      projectId: "montra-site",
      storageBucket: "COLOCA_AQUI",
      messagingSenderId: "COLOCA_AQUI",
      appId: "COLOCA_AQUI"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    // LOGIN
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login feito!");
        })
        .catch(error => {
          alert(error.message);
        });
    }

    // REGISTO
    function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Conta criada!");
        })
        .catch(error => {
          alert(error.message);
        });
    }

    // COMPRAR (guarda no Firestore)
    function comprar(nome, preco) {
      const user = auth.currentUser;

      if (!user) {
        alert("Tens de fazer login primeiro!");
        return;
      }

      db.collection("encomendas").add({
        user: user.email,
        produto: nome,
        preco: preco,
        data: new Date()
      })
      .then(() => {
        alert("Compra guardada!");
      })
      .catch(error => {
        alert(error.message);
      });
    }
  </script>

</body>
</html>
