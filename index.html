<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #000;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 60px;
  align-items: center;
}

.logo {
  font-weight: 600;
  letter-spacing: 2px;
}

/* LOGIN */
.auth {
  display: flex;
  gap: 10px;
}

input {
  padding: 6px;
  border: none;
}

/* BOTÕES */
button {
  background: white;
  color: black;
  border: none;
  padding: 8px 14px;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 56px;
}

/* PRODUTOS */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  padding: 60px;
}

.card {
  text-align: center;
}

.card img {
  width: 100%;
  max-height: 500px;
  object-fit: cover;
}

.price {
  margin: 10px;
}

/* CARRINHO */
.cart {
  position: fixed;
  right: -350px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

.cart.active {
  right: 0;
}
</style>

</head>
<body>

<!-- NAV -->
<div class="nav">

  <div class="logo">B1M</div>

  <div class="auth" id="authArea">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar</button>
  </div>

  <div id="userArea" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
    <button onclick="toggleCart()">Carrinho</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h1>Relógios que definem presença.</h1>
  <p>Minimalismo. Precisão.</p>
</div>

<!-- PRODUTOS -->
<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <h3>Phantom Black</h3>
    <p class="price">99€</p>
    <button onclick="addCarrinho('Phantom Black',99)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <h3>Silver Steel</h3>
    <p class="price">129€</p>
    <button onclick="addCarrinho('Silver Steel',129)">Adicionar</button>
  </div>

</div>

<!-- CARRINHO -->
<div id="cart" class="cart">
  <h2>Carrinho</h2>
  <div id="lista"></div>
  <p>Total: <span id="total">0</span>€</p>
  <button onclick="finalizar()">Finalizar</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.appspot.com",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Login feito"))
    .catch(e => alert(e.message));
}

/* REGISTO */
window.register = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(() => alert("Conta criada"))
    .catch(e => alert(e.message));
}

/* LOGOUT */
window.logout = () => signOut(auth);

/* ESTADO LOGIN */
onAuthStateChanged(auth, user => {

  if (user) {
    authArea.style.display = "none";
    userArea.style.display = "flex";
    userEmail.innerText = user.email;
    email.value = "";
    password.value = "";
  } else {
    authArea.style.display = "flex";
    userArea.style.display = "none";
  }

});

/* CARRINHO */
let carrinho = [];

window.addCarrinho = (nome, preco) => {
  carrinho.push({ nome, preco });
  render();
}

function render() {
  lista.innerHTML = "";
  let total = 0;

  carrinho.forEach(p => {
    total += p.preco;
    lista.innerHTML += `<p>${p.nome} - ${p.preco}€</p>`;
  });

  totalEl.innerText = total;
}

const totalEl = document.getElementById("total");

/* MOSTRAR CARRINHO */
window.toggleCart = () => {
  cart.classList.toggle("active");
}

/* FINALIZAR */
window.finalizar = async () => {

  const user = auth.currentUser;

  if (!user) return alert("Faz login primeiro");

  let total = carrinho.reduce((t,p)=>t+p.preco,0);

  await addDoc(collection(db, "encomendas"), {
    user: user.email,
    total: total,
    items: carrinho
  });

  alert("Compra guardada!");
  carrinho = [];
  render();
}

</script>

</body>
</html>
