<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: black;
  color: white;
}

.nav {
  padding: 30px;
}

.grid {
  padding: 60px;
}

.card {
  margin-bottom: 80px;
}

.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

button {
  background: white;
  color: black;
  padding: 10px;
  border: none;
}
</style>

</head>
<body>

<div class="nav">B1M</div>

<div class="grid" id="grid"></div>

<script>

const pecas = [
  {
    id: "phantom",
    nome: "Phantom Black",
    imagem: "https://images.unsplash.com/photo-1523275335684-37898b6baf30",
    resumo: "Silêncio como escolha."
  },
  {
    id: "silver",
    nome: "Silver Steel",
    imagem: "https://images.unsplash.com/photo-1524592094714-0f0654e20314",
    resumo: "Controlo aprendido."
  }
];

const grid = document.getElementById("grid");

pecas.forEach(p => {
  grid.innerHTML += `
    <div class="card">
      <img src="${p.imagem}">
      <h2>${p.nome}</h2>
      <p>${p.resumo}</p>
      <button onclick="abrir('${p.id}')">Ver peça</button>
    </div>
  `;
});

function abrir(id) {
  window.location.href = "peca.html?id=" + id;
}

</script>

</body>
</html>


</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.appspot.com",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = () => signOut(auth);

/* ESTADO */
onAuthStateChanged(auth, user => {

  if (user) {
    authArea.style.display = "none";
    userArea.style.display = "block";
    userEmail.innerText = user.email;
  } else {
    authArea.style.display = "flex";
    userArea.style.display = "none";
  }

});

/* PEDIDO (ISTO SUBSTITUI O CARRINHO) */
window.pedir = async (nome) => {

  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro.");
    return;
  }

  await addDoc(collection(db, "pedidos"), {
    user: user.email,
    peça: nome,
    estado: "pedido",
    data: new Date()
  });

  alert("Pedido registado. Vamos entrar em contacto.");
};

</script>

</body>
</html>
