<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CMS B1M</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: -apple-system;
  padding: 40px;
  max-width: 800px;
  margin: auto;
}

h1 {
  font-size: 32px;
  margin-bottom: 30px;
}

input, textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  background: #111;
  border: 1px solid #222;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  background: #fff;
  color: #000;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

.preview img {
  width: 100px;
  margin: 5px;
}

.peca {
  border: 1px solid #222;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>CMS B1M</h1>

<input id="nome" placeholder="Nome">
<textarea id="desc" placeholder="História"></textarea>
<input type="file" id="files" multiple>

<div class="preview" id="preview"></div>

<button onclick="criar()">Criar peça</button>

<h2>Peças</h2>
<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, getDocs, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.appspot.com",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:abc123"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let imagens = [];
let aCriar = false;

// PREVIEW IMAGENS
document.getElementById("files").addEventListener("change", (e) => {
  imagens = [...e.target.files];

  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  imagens.forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

// CRIAR PEÇA
window.criar = async function () {

  if (aCriar) return;
  aCriar = true;

  const nome = document.getElementById("nome").value.trim();
  const desc = document.getElementById("desc").value.trim();

  if (!nome) {
    alert("Nome obrigatório");
    aCriar = false;
    return;
  }

  const id = nome.toLowerCase().replace(/\s+/g, "-");

  let urls = [];

  for (const file of imagens) {
    const storageRef = ref(storage, "pecas/" + Date.now() + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    urls.push(url);
  }

  await setDoc(doc(db, "pecas", id), {
    nome,
    desc,
    imagens: urls,
    createdAt: new Date()
  });

  alert("Peça criada");

  document.getElementById("nome").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("preview").innerHTML = "";

  carregar();

  aCriar = false;
};

// LISTAR PEÇAS
async function carregar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "pecas"));

  querySnapshot.forEach(docSnap => {
    const p = docSnap.data();

    const div = document.createElement("div");
    div.className = "peca";

    div.innerHTML = `
      <strong>${p.nome}</strong><br>
      <button onclick="apagar('${docSnap.id}')">Apagar</button>
    `;

    lista.appendChild(div);
  });
}

// APAGAR
window.apagar = async function(id) {
  if (!confirm("Apagar peça?")) return;

  await deleteDoc(doc(db, "pecas", id));
  carregar();
};

carregar();

</script>

</body>
</html>
