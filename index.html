<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 25px 40px;
  border-bottom: 1px solid #222;
}

.logo {
  letter-spacing: 5px;
}

/* AUTH */
#auth-area {
  position: fixed;
  top: 20px;
  right: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px;
}

/* PRODUTOS */
.produtos {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.produto {
  background: #1a1a1a;
  margin: 20px;
  padding: 20px;
  width: 260px;
  border-radius: 12px;
}

.produto img {
  width: 100%;
}

/* CARRINHO */
#carrinho {
  position: fixed;
  right: -350px;
  top: 0;
  width: 350px;
  height: 100%;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

#carrinho.active {
  right: 0;
}

.item {
  border-bottom: 1px solid #333;
  padding: 10px 0;
}

button {
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>
  <div class="logo">B1M</div>
  <div onclick="toggleCart()" style="cursor:pointer;">🛒</div>
</header>

<!-- AUTH -->
<div id="auth-area">

  <div id="login-box">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar conta</button>
  </div>

  <div id="user-box" style="display:none;">
    <p id="user-email"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<div class="hero">
  <h1>B1M WATCHES</h1>
</div>

<div class="produtos">

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <h3>Phantom Black</h3>
    <p>99€</p>
    <button onclick="addToCart('Phantom Black',99)">Adicionar</button>
  </div>

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa">
    <h3>Silver Steel</h3>
    <p>129€</p>
    <button onclick="addToCart('Silver Steel',129)">Adicionar</button>
  </div>

</div>

<!-- CARRINHO -->
<div id="carrinho">
  <h2>Carrinho</h2>
  <div id="cart-items"></div>
  <h3 id="total"></h3>
  <button onclick="checkout()">Finalizar compra</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* AUTH */
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  loginBox.style.display = user ? "none" : "block";
  userBox.style.display = user ? "block" : "none";
  userEmail.innerText = user ? "Olá, " + user.email : "";
});

/* CARRINHO */
let cart = [];

function addToCart(nome, preco) {
  cart.push({nome, preco});
  renderCart();
}

function renderCart() {
  let total = 0;
  cartItems.innerHTML = "";

  cart.forEach(item => {
    total += item.preco;
    cartItems.innerHTML += `<div class="item">${item.nome} - ${item.preco}€</div>`;
  });

  totalEl.innerText = "Total: " + total + "€";
}

function toggleCart() {
  carrinho.classList.toggle("active");
}

/* CHECKOUT (GUARDA NO FIREBASE) */
function checkout() {
  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro!");
    return;
  }

  if (cart.length === 0) {
    alert("Carrinho vazio!");
    return;
  }

  db.collection("encomendas").add({
    user: user.email,
    items: cart,
    total: cart.reduce((sum, i) => sum + i.preco, 0),
    data: new Date()
  });

  alert("Compra realizada 🔥");

  cart = [];
  renderCart();
}
</script>

</body>
</html>
