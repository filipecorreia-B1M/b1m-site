<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
}

h1 {
  color: gold;
}

/* AUTH NO CANTO */
#auth-area {
  position: fixed;
  top: 20px;
  right: 20px;
}

#login-box, #user-box {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #333;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 200px;
}

button {
  padding: 8px 15px;
  margin: 5px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.produtos {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.produto {
  border: 1px solid #333;
  padding: 20px;
  margin: 20px;
  width: 220px;
  background: #1a1a1a;
  border-radius: 10px;
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.05);
  border-color: gold;
}

img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>B1M Watches</h1>

<!-- AUTH -->
<div id="auth-area">

  <div id="login-box">
    <h3>Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar conta</button>
  </div>

  <div id="user-box" style="display:none;">
    <p id="user-email"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<h2>Loja</h2>

<div class="produtos">

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <h3>B1M Classic</h3>
    <p>99€</p>
    <button onclick="comprar('B1M Classic', 99)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <h3>B1M Gold</h3>
    <p>149€</p>
    <button onclick="comprar('B1M Gold', 149)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <h3>B1M Black</h3>
    <p>129€</p>
    <button onclick="comprar('B1M Black', 129)">Comprar</button>
  </div>

</div>

<!-- FIREBASE (VERSÃO CERTA) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
      authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

// REGISTO
function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

// LOGOUT
function logout() {
  auth.signOut();
}

// ESTADO DO UTILIZADOR
auth.onAuthStateChanged(user => {

  const loginBox = document.getElementById("login-box");
  const userBox = document.getElementById("user-box");
  const userEmail = document.getElementById("user-email");

  if (user) {
    loginBox.style.display = "none";
    userBox.style.display = "block";
    userEmail.innerText = "Olá, " + user.email;
  } else {
    loginBox.style.display = "block";
    userBox.style.display = "none";
  }

  // LIMPAR CAMPOS SEMPRE
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
});

// COMPRAR
function comprar(nome, preco) {
  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro!");
    return;
  }

  db.collection("encomendas").add({
    user: user.email,
    produto: nome,
    preco: preco,
    data: new Date()
  })
  .then(() => alert("Compra feita!"))
  .catch(e => alert(e.message));
}
</script>

</body>
</html>
