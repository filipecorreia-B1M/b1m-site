<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 20px;
  letter-spacing: 3px;
  color: gold;
}

/* AUTH */
.auth input {
  padding: 6px;
  margin: 0 5px;
}

button {
  background: gold;
  border: none;
  padding: 8px 15px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  padding: 100px 60px;
  max-width: 1200px;
}

.hero h1 {
  font-size: 48px;
}

.hero p {
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 60px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
}

.desc {
  color: #888;
}

.price {
  margin: 10px 0;
  font-weight: bold;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: #111;
  padding: 20px;
  border-left: 1px solid #333;
}
</style>

</head>
<body>

<div class="nav">
  <div class="logo">B1M</div>

  <div id="authArea" class="auth">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar</button>
  </div>

  <div id="userArea" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<div class="hero">
  <h1>Relógios que definem presença.</h1>
  <p>Design minimalista. Construção premium.</p>
</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <div class="card-content">
      <h3>Phantom Black</h3>
      <p class="desc">Minimalismo. Elegância absoluta.</p>
      <p class="price">99€</p>
      <button onclick="addCarrinho('Phantom Black',99)">Adicionar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <div class="card-content">
      <h3>Silver Steel</h3>
      <p class="desc">Clássico moderno.</p>
      <p class="price">129€</p>
      <button onclick="addCarrinho('Silver Steel',129)">Adicionar</button>
    </div>
  </div>

</div>

<div class="carrinho">
  <h2>Carrinho</h2>
  <div id="listaCarrinho"></div>
  <p>Total: <span id="total">0</span>€</p>
  <button onclick="finalizarCompra()">Finalizar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let carrinho = [];

/* LOGIN */
window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, password.value);
};

window.register = async () => {
  await createUserWithEmailAndPassword(auth, email.value, password.value);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  authArea.style.display = user ? "none" : "block";
  userArea.style.display = user ? "block" : "none";
  userEmail.innerText = user ? user.email : "";
});

/* CARRINHO */
window.addCarrinho = (nome, preco) => {
  carrinho.push({ nome, preco });
  render();
};

function render() {
  let total = 0;
  listaCarrinho.innerHTML = "";

  carrinho.forEach(p => {
    total += p.preco;
    listaCarrinho.innerHTML += `<p>${p.nome} - ${p.preco}€</p>`;
  });

  totalEl.innerText = total;
}

/* CHECKOUT */
window.finalizarCompra = async () => {
  const user = auth.currentUser;

  if (!user) return alert("Faz login!");

  const total = carrinho.reduce((a,b)=>a+b.preco,0);

  await addDoc(collection(db, "encomendas"), {
    user: user.email,
    produtos: carrinho,
    total: total,
    estado: "pendente",
    data: new Date()
  });

  alert("Compra feita!");

  carrinho = [];
  render();
};

</script>

</body>
</html>
