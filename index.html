<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  border-bottom: 1px solid #222;
}

.logo {
  font-weight: bold;
  letter-spacing: 2px;
}

.auth {
  display: flex;
  gap: 10px;
}

.auth input {
  padding: 8px;
  width: 140px;
}

.auth button {
  background: gold;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px;
  text-align: center;
}

h1 {
  margin-bottom: 40px;
}

/* PRODUTOS */
.produtos {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.produto {
  background: #111;
  padding: 20px;
  width: 280px;
  border-radius: 10px;
  text-align: left;
  transition: 0.3s;
}

.produto:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 30px rgba(255,215,0,0.2);
}

.produto img {
  width: 100%;
  border-radius: 8px;
}

.produto button {
  background: gold;
  border: none;
  padding: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* USER INFO */
#userBox {
  display: none;
}

/* CARRINHO */
#cart {
  position: fixed;
  right: 20px;
  top: 80px;
  background: #111;
  padding: 20px;
  width: 250px;
  display: none;
  border: 1px solid #333;
  border-radius: 10px;
}

#cart button {
  width: 100%;
  margin-top: 10px;
  background: gold;
  border: none;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">B1M</div>

  <div class="auth" id="loginBox">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar</button>
  </div>

  <div id="userBox">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>

  <div onclick="toggleCart()" style="cursor:pointer;">🛒</div>
</header>

<div class="container">
  <h1>B1M WATCHES</h1>

  <div class="produtos">

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
      <h3>Phantom Black</h3>
      <p>99€</p>
      <button onclick="addToCart('Phantom Black', 99)">Adicionar</button>
    </div>

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1518544801976-3e1886f6b7fa">
      <h3>Silver Steel</h3>
      <p>129€</p>
      <button onclick="addToCart('Silver Steel', 129)">Adicionar</button>
    </div>

  </div>
</div>

<div id="cart">
  <h3>Carrinho</h3>
  <ul id="cartItems"></ul>
  <p>Total: <span id="total">0€</span></p>
  <button onclick="checkout()">Finalizar</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBox = document.getElementById("loginBox");
const userBox = document.getElementById("userBox");
const userEmail = document.getElementById("userEmail");

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.register = function() {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = function() {
  signOut(auth);
};

onAuthStateChanged(auth, user => {
  loginBox.style.display = user ? "none" : "flex";
  userBox.style.display = user ? "block" : "none";
  userEmail.innerText = user ? user.email : "";

  email.value = "";
  password.value = "";
});

/* CARRINHO */
let cart = [];

window.addToCart = function(nome, preco) {
  cart.push({nome, preco});
  renderCart();
};

function renderCart() {
  const list = document.getElementById("cartItems");
  const total = document.getElementById("total");

  list.innerHTML = "";
  let sum = 0;

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.nome + " - " + item.preco + "€";
    list.appendChild(li);
    sum += item.preco;
  });

  total.innerText = sum + "€";
}

window.toggleCart = function() {
  const cartDiv = document.getElementById("cart");
  cartDiv.style.display = cartDiv.style.display === "block" ? "none" : "block";
};

window.checkout = async function() {
  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro");
    return;
  }

  await addDoc(collection(db, "encomendas"), {
    user: user.email,
    cart: cart,
    total: cart.reduce((a,b)=>a+b.preco,0),
    data: new Date()
  });

  alert("Encomenda feita 🔥");
  cart = [];
  renderCart();
};
</script>

</body>
</html>
