<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* NAVBAR */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #222;
}

.logo {
  color: gold;
  font-weight: bold;
}

.auth input {
  padding: 5px;
  margin: 0 5px;
}

button {
  background: gold;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

/* PRODUTOS */
.produtos {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 40px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  width: 250px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: #111;
  padding: 20px;
  border-left: 1px solid #333;
}
</style>

</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">B1M</div>

  <div id="authArea" class="auth">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar</button>
  </div>

  <div id="userArea" style="display:none;">
    <span id="userEmail"></span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>B1M WATCHES</h1>
</div>

<!-- PRODUTOS -->
<div class="produtos">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <h3>Phantom Black</h3>
    <p>99€</p>
    <button onclick="addCarrinho('Phantom Black',99)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <h3>Silver Steel</h3>
    <p>129€</p>
    <button onclick="addCarrinho('Silver Steel',129)">Adicionar</button>
  </div>
</div>

<!-- CARRINHO -->
<div class="carrinho">
  <h2>Carrinho</h2>
  <div id="listaCarrinho"></div>
  <p>Total: <span id="total">0</span>€</p>
  <button onclick="finalizarCompra()">Finalizar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let carrinho = [];

/* AUTH */
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, password);
};

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth, email, password);
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("authArea").style.display = "none";
    document.getElementById("userArea").style.display = "block";
    document.getElementById("userEmail").innerText = user.email;
  } else {
    document.getElementById("authArea").style.display = "block";
    document.getElementById("userArea").style.display = "none";
  }
});

/* CARRINHO */
window.addCarrinho = (nome, preco) => {
  carrinho.push({ nome, preco });
  renderCarrinho();
};

function renderCarrinho() {
  const lista = document.getElementById("listaCarrinho");
  lista.innerHTML = "";

  let total = 0;

  carrinho.forEach(p => {
    total += p.preco;
    lista.innerHTML += `<p>${p.nome} - ${p.preco}€</p>`;
  });

  document.getElementById("total").innerText = total;
}

/* CHECKOUT */
window.finalizarCompra = async () => {
  const user = auth.currentUser;

  if (!user) return alert("Faz login!");

  const total = carrinho.reduce((acc, p) => acc + p.preco, 0);

  await addDoc(collection(db, "encomendas"), {
    user: user.email,
    produtos: carrinho,
    total: total,
    estado: "pendente",
    data: new Date()
  });

  alert("Compra feita!");

  carrinho = [];
  renderCarrinho();
};

</script>

</body>
</html>
