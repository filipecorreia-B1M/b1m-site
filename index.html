<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>B1M Watches</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: gold;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      background: gold;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

   .produto {
  border: 1px solid #333;
  padding: 20px;
  margin: 20px;
  width: 220px;
  background: #1a1a1a;
  border-radius: 10px;
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.05);
  border-color: gold;
}

img {
  border-radius: 10px;
}
  </style>
</head>

<body>

  <h1>B1M Watches</h1>

  <h2>Login / Registo</h2>
  

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Entrar</button>
  <button onclick="logout()">Sair</button>
  <button onclick="register()">Criar conta</button>

  <h2>Loja</h2>

<div style="display: flex; flex-wrap: wrap; justify-content: center;">

  <div class="produto">
    <img src="https://via.placeholder.com/200" width="200">
    <h3>B1M Classic</h3>
    <p>99€</p>
    <button onclick="comprar('B1M Classic', 99)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200" width="200">
    <h3>B1M Gold Edition</h3>
    <p>149€</p>
    <button onclick="comprar('B1M Gold', 149)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200" width="200">
    <h3>B1M Black Pro</h3>
    <p>129€</p>
    <button onclick="comprar('B1M Black', 129)">Comprar</button>
  </div>

</div>
  <!-- Firebase (VERSÃO CORRETA) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // CONFIG FIREBASE (usa a tua!)
    const firebaseConfig = {
      apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
      authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};

    // INICIALIZAR FIREBASE
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    // LOGIN
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login feito!");
        })
        .catch(error => {
          alert(error.message);
        });
    }
    // LOGOUT
    function logout() {
  auth.signOut()
    .then(() => {
      alert("Sessão terminada!");
    })
    .catch(error => {
      alert(error.message);
    });
}
    // REGISTO
    function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Conta criada!");
        })
        .catch(error => {
          alert(error.message);
        });
    }

    // COMPRAR
    function comprar(nome, preco) {
      const user = auth.currentUser;

      if (!user) {
        alert("Tens de fazer login primeiro!");
        return;
      }

      db.collection("encomendas").add({
        user: user.email,
        produto: nome,
        preco: preco,
        data: new Date()
      })
      .then(() => {
        alert("Compra guardada!");
      })
      .catch(error => {
        alert(error.message);
      });
    }

  </script>
  
auth.onAuthStateChanged(user => {
  if (user) {
    console.log("Utilizador logado:", user.email);
  } else {
    console.log("Sem utilizador");
  }
});
  
</body>
</html>
