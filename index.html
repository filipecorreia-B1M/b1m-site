<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 25px 40px;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 20px;
  letter-spacing: 5px;
}

nav {
  color: #aaa;
}

/* AUTH */
#auth-area {
  position: fixed;
  top: 20px;
  right: 20px;
}

#login-box, #user-box {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #333;
}

input {
  display: block;
  margin: 8px 0;
  padding: 10px;
  width: 200px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 10px 15px;
  margin-top: 5px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  padding: 80px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  letter-spacing: 6px;
}

.hero p {
  color: #aaa;
  margin-top: 10px;
}

/* PRODUTOS */
.produtos {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  padding: 40px;
}

.produto {
  background: #1a1a1a;
  margin: 20px;
  padding: 20px;
  width: 260px;
  border-radius: 12px;
  transition: 0.3s;
}

.produto:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 40px rgba(255,255,255,0.08);
}

.produto img {
  width: 100%;
  border-radius: 10px;
}

.produto h3 {
  margin: 15px 0 5px;
}

.produto p {
  color: #aaa;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #555;
}
</style>
</head>

<body>

<header>
  <div class="logo">B1M</div>
  <nav>CUSTOM WATCHES</nav>
</header>

<!-- AUTH -->
<div id="auth-area">

  <div id="login-box">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar conta</button>
  </div>

  <div id="user-box" style="display:none;">
    <p id="user-email"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h1>B1M WATCHES</h1>
  <p>Relógios personalizados para quem quer destacar-se</p>
</div>

<!-- PRODUTOS -->
<div class="produtos">

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
    <h3>Phantom Black</h3>
    <p>Minimalista. Poderoso.</p>
    <p><strong>99€</strong></p>
    <button onclick="comprar('Phantom Black', 99)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa">
    <h3>Silver Steel</h3>
    <p>Clássico moderno.</p>
    <p><strong>129€</strong></p>
    <button onclick="comprar('Silver Steel', 129)">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
    <h3>Gold Edition</h3>
    <p>Luxo puro.</p>
    <p><strong>149€</strong></p>
    <button onclick="comprar('Gold Edition', 149)">Comprar</button>
  </div>

</div>

<footer>
© 2026 B1M Watches
</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
      authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};


firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function register() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  loginBox.style.display = user ? "none" : "block";
  userBox.style.display = user ? "block" : "none";
  userEmail.innerText = user ? "Olá, " + user.email : "";

  email.value = "";
  password.value = "";
});

function comprar(nome, preco) {
  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro!");
    return;
  }

  db.collection("encomendas").add({
    user: user.email,
    produto: nome,
    preco: preco,
    data: new Date()
  });

  alert("Compra feita!");
}
</script>

</body>
</html>
