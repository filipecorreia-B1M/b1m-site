<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: black;
  color: white;
}

.nav {
  padding: 30px;
}

.grid {
  padding: 60px;
}

.card {
  margin-bottom: 80px;
}

.card img {
  width: 100%;
  height: 400px;
  object-fit: cover;
}

button {
  background: white;
  color: black;
  padding: 10px;
  border: none;
}
</style>

</head>
<body>

<div class="nav">B1M</div>

<div class="grid" id="grid"></div>

<script>

const pecas = [
  {
    id: "phantom",
    nome: "Phantom Black",
    imagem: "https://images.unsplash.com/photo-1523275335684-37898b6baf30",
    resumo: "Silêncio como escolha."
  },
  {
    id: "silver",
    nome: "Silver Steel",
    imagem: "https://images.unsplash.com/photo-1524592094714-0f0654e20314",
    resumo: "Controlo aprendido."
  }
];

const grid = document.getElementById("grid");

pecas.forEach(p => {
  grid.innerHTML += `
    <div class="card">
      <img src="${p.imagem}">
      <h2>${p.nome}</h2>
      <p>${p.resumo}</p>
      <button onclick="abrir('${p.id}')">Ver peça</button>
    </div>
  `;
});

function abrir(id) {
  window.location.href = "peca.html?id=" + id;
}

</script>

</body>
</html>


</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

const grid = document.getElementById("grid");

const snap = await getDocs(collection(db, "pecas"));

snap.forEach(doc => {
  const p = doc.data();

  grid.innerHTML += `
    <div class="card">
      <img src="${p.imagem}">
      <h2>${p.nome}</h2>
      <p>${p.resumo}</p>
      <button onclick="abrir('${doc.id}')">Ver peça</button>
    </div>
  `;
});

window.abrir = (id) => {
  window.location.href = "peca.html?id=" + id;
};

</script>

</body>
</html>
