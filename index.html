<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>B1M Watches</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial;
  background: #fff;
  color: #111;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  border-bottom: 1px solid #eee;
}

.logo {
  font-weight: bold;
  letter-spacing: 3px;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  text-decoration: none;
  color: #111;
  font-size: 14px;
}

.actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.actions input {
  padding: 6px;
  width: 120px;
}

.actions button {
  padding: 6px 10px;
  background: gold;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 70vh;
  background: url("https://images.unsplash.com/photo-1523170335258-f5ed11844a49") center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
}

.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  background: gold;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* SECTION */
.section {
  max-width: 1200px;
  margin: 80px auto;
  padding: 0 20px;
}

/* EDITORIAL */
.editorial {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card h3 {
  margin-top: 10px;
}

/* PRODUTOS */
.produtos {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.produto img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.produto button {
  margin-top: 10px;
  padding: 10px;
  background: gold;
  border: none;
  cursor: pointer;
}

/* USER */
#userBox {
  display: none;
}

/* CART */
#cart {
  position: fixed;
  right: 20px;
  top: 80px;
  background: white;
  padding: 20px;
  width: 250px;
  display: none;
  border: 1px solid #ddd;
}

</style>
</head>

<body>

<header>
  <div class="logo">B1M</div>

  <nav>
    <a href="#">Shop</a>
    <a href="#">Stories</a>
    <a href="#">About</a>
  </nav>

  <!-- LOGIN -->
  <div class="actions" id="loginBox">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Entrar</button>
    <button onclick="register()">Criar</button>
  </div>

  <!-- USER -->
  <div id="userBox">
    <span id="userEmail"></span>
    <button onclick="logout()">Sair</button>
  </div>

  <div onclick="toggleCart()" style="cursor:pointer;">🛒</div>
</header>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>B1M WATCHES</h1>
    <button onclick="window.scrollTo(0,800)">Explorar</button>
  </div>
</div>

<!-- PRODUTOS -->
<div class="section">
  <h2>Shop</h2>

  <div class="produtos">

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314">
      <h3>Phantom Black</h3>
      <p>99€</p>
      <button onclick="addToCart('Phantom Black', 99)">Adicionar</button>
    </div>

    <div class="produto">
      <img src="https://images.unsplash.com/photo-1518544801976-3e1886f6b7fa">
      <h3>Silver Steel</h3>
      <p>129€</p>
      <button onclick="addToCart('Silver Steel', 129)">Adicionar</button>
    </div>

  </div>
</div>

<!-- CART -->
<div id="cart">
  <h3>Carrinho</h3>
  <ul id="cartItems"></ul>
  <p>Total: <span id="total">0€</span></p>
  <button onclick="checkout()">Finalizar</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBox = document.getElementById("loginBox");
const userBox = document.getElementById("userBox");
const userEmail = document.getElementById("userEmail");

/* LOGIN */
window.login = function() {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.register = function() {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = function() {
  signOut(auth);
};

/* STATE */
onAuthStateChanged(auth, user => {
  loginBox.style.display = user ? "none" : "flex";
  userBox.style.display = user ? "block" : "none";
  userEmail.innerText = user ? user.email : "";

  email.value = "";
  password.value = "";
});

/* CART */
let cart = [];

window.addToCart = function(nome, preco) {
  cart.push({nome, preco});
  renderCart();
};

function renderCart() {
  const list = document.getElementById("cartItems");
  const total = document.getElementById("total");

  list.innerHTML = "";
  let sum = 0;

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.nome + " - " + item.preco + "€";
    list.appendChild(li);
    sum += item.preco;
  });

  total.innerText = sum + "€";
}

window.toggleCart = function() {
  const cartDiv = document.getElementById("cart");
  cartDiv.style.display = cartDiv.style.display === "block" ? "none" : "block";
};

window.checkout = async function() {
  const user = auth.currentUser;

  if (!user) {
    alert("Faz login primeiro");
    return;
  }

  await addDoc(collection(db, "encomendas"), {
    user: user.email,
    cart: cart,
    total: cart.reduce((a,b)=>a+b.preco,0),
    data: new Date()
  });

  alert("Compra feita 🔥");
  cart = [];
  renderCart();
};
</script>

</body>
</html>
