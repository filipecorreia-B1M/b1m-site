<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CMS B1M</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  padding: 40px;
}

.hidden {
  display: none;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

button {
  background: white;
  color: black;
  padding: 10px;
  border: none;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- CMS -->
<div id="cms" class="hidden">

  <h1>Criar Nova Peça</h1>

  <input id="nome" placeholder="Nome">
  <input id="imagem" placeholder="URL da imagem">
  <textarea id="resumo" placeholder="Resumo"></textarea>
  <textarea id="historia" placeholder="História"></textarea>

  <button onclick="criar()">Criar peça</button>
  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* 🔐 DEFINE O TEU EMAIL */
const ADMIN_EMAIL = "the4750project@gmail.com";

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* CONTROLO DE ACESSO */
onAuthStateChanged(auth, user => {

  if (!user) {
    loginBox.style.display = "block";
    cms.style.display = "none";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Acesso negado.");
    signOut(auth);
    return;
  }

  loginBox.style.display = "none";
  cms.style.display = "block";

});

/* CRIAR PEÇA */
window.criar = async () => {

  await addDoc(collection(db, "pecas"), {
    nome: nome.value,
    imagem: imagem.value,
    resumo: resumo.value,
    historia: historia.value,
    data: new Date()
  });

  alert("Peça criada!");

  nome.value = "";
  imagem.value = "";
  resumo.value = "";
  historia.value = "";
};

</script>

</body>
</html>
