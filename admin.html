<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CMS B1M</title>

<style>
body {
  background: #000;
  color: white;
  font-family: -apple-system, Arial;
  padding: 40px;
}

/* LOGIN */
#loginBox {
  max-width: 300px;
  margin: auto;
}

/* CMS */
#cms {
  max-width: 600px;
  margin: auto;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button {
  background: white;
  color: black;
  padding: 12px;
  border: none;
  cursor: pointer;
  width: 100%;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 80px;
  height: 80px;
  object-fit: cover;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<!-- CMS -->
<div id="cms" style="display:none;">

  <h1>Nova Peça</h1>

  <input id="nome" placeholder="Nome da peça">

  <input type="file" id="files" multiple>

  <div class="preview" id="preview"></div>

  <textarea id="resumo" placeholder="Resumo curto"></textarea>
  <textarea id="historia" placeholder="História completa"></textarea>

  <button onclick="criar()">Criar peça</button>
  <br><br>
  <button onclick="logout()">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* 🔧 CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.appspot.com",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

/* 🔐 ADMIN EMAIL */
const ADMIN_EMAIL = "the4750project@gmail.com";

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();
const storage = getStorage();

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = () => signOut(auth);

/* PROTEÇÃO */
onAuthStateChanged(auth, user => {

  if (!user) {
    loginBox.style.display = "block";
    cms.style.display = "none";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Acesso negado");
    signOut(auth);
    return;
  }

  loginBox.style.display = "none";
  cms.style.display = "block";
});

/* PREVIEW IMAGENS */
files.addEventListener("change", () => {

  preview.innerHTML = "";

  Array.from(files.files).forEach(file => {
    const reader = new FileReader();

    reader.onload = e => {
      preview.innerHTML += `<img src="${e.target.result}">`;
    };

    reader.readAsDataURL(file);
  });

});

/* CRIAR PEÇA */
window.criar = async () => {

  const selectedFiles = files.files;

  if (selectedFiles.length === 0) {
    alert("Escolhe imagens");
    return;
  }

  let urls = [];

  for (let i = 0; i < selectedFiles.length; i++) {

    const storageRef = ref(storage, "pecas/" + Date.now() + "_" + i);

    await uploadBytes(storageRef, selectedFiles[i]);

    const url = await getDownloadURL(storageRef);

    urls.push(url);
  }

  await addDoc(collection(db, "pecas"), {
    nome: nome.value,
    imagens: urls,
    resumo: resumo.value,
    historia: historia.value,
    data: new Date()
  });

  alert("Peça criada com sucesso 🔥");

  nome.value = "";
  resumo.value = "";
  historia.value = "";
  files.value = "";
  preview.innerHTML = "";

};

</script>

</body>
</html>
