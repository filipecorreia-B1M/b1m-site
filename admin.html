<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin B1M</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  padding: 40px;
}

h1 {
  color: gold;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>📦 Encomendas B1M</h1>

<!-- 🔥 ESTE É O ELEMENTO QUE FALTAVA -->
<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregar() {
  const lista = document.getElementById("lista");

  try {
    const snapshot = await getDocs(collection(db, "encomendas"));

    if (snapshot.empty) {
      lista.innerHTML = "<p>Sem encomendas ainda...</p>";
      return;
    }

    snapshot.forEach(doc => {
      const data = doc.data();

      lista.innerHTML += `
        <div class="card">
          <p><strong>Cliente:</strong> ${data.user}</p>
          <p><strong>Total:</strong> ${data.total || data.preco || 0}€</p>
        </div>
      `;
    });

  } catch (e) {
    alert("Erro: " + e.message);
  }
}

carregar();

</script>

</body>
</html>
