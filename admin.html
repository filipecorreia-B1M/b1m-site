<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CMS B1M</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  padding: 40px;
}

input, textarea {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
}

button {
  background: white;
  color: black;
  padding: 10px;
  border: none;
}
</style>

</head>
<body>

<h1>Criar Nova Peça</h1>

<input id="nome" placeholder="Nome">
<input id="imagem" placeholder="URL da imagem">
<textarea id="resumo" placeholder="Resumo"></textarea>
<textarea id="historia" placeholder="História completa"></textarea>

<button onclick="criar()">Criar peça</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AQUI_API_KEY",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

window.criar = async () => {

  await addDoc(collection(db, "pecas"), {
    nome: nome.value,
    imagem: imagem.value,
    resumo: resumo.value,
    historia: historia.value,
    data: new Date()
  });

  alert("Peça criada!");

};

</script>

</body>
</html>
