<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>CMS B1M</title>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      padding: 40px;
    }

    h1 {
      color: gold;
    }

    input, textarea {
      display: block;
      width: 400px;
      margin-bottom: 15px;
      padding: 10px;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      font-weight: bold;
    }

    img {
      width: 120px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🧱 CMS B1M</h1>

<div id="login">
  <h2>Login Admin</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<div id="cms" style="display:none;">
  <h2>Nova Peça</h2>

  <input id="nome" placeholder="Nome da peça">
  <textarea id="historia" placeholder="História"></textarea>

  <input type="file" id="file">

  <button onclick="criar()">Criar peça</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- FIREBASE (VERSÃO COMPAT) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();


// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Entraste!");
    })
    .catch(e => alert(e.message));
}


// 🔓 LOGOUT
function logout() {
  auth.signOut();
}


// 🔁 CONTROLO DE SESSÃO
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("login").style.display = "none";
    document.getElementById("cms").style.display = "block";
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("cms").style.display = "none";
  }
});


// 🚀 CRIAR PEÇA
async function criar() {
  try {
    console.log("🔥 iniciar criação");

    const nome = document.getElementById("nome").value;
    const historia = document.getElementById("historia").value;
    const fileInput = document.getElementById("file");

    if (!nome || !historia || fileInput.files.length === 0) {
      alert("Preenche tudo!");
      return;
    }

    const file = fileInput.files[0];

    console.log("📦 upload...");

    const ref = storage.ref().child("pecas/" + Date.now() + "_" + file.name);

    await ref.put(file);

    const url = await ref.getDownloadURL();

    console.log("✅ upload feito");

    await db.collection("pecas").add({
      nome: nome,
      historia: historia,
      imagem: url,
      preco: 299,
      createdAt: new Date()
    });

    alert("Peça criada!");

    // limpar campos
    document.getElementById("nome").value = "";
    document.getElementById("historia").value = "";
    document.getElementById("file").value = "";

  } catch (e) {
    console.error(e);
    alert("Erro: " + e.message);
  }
}
</script>

</body>
</html>
