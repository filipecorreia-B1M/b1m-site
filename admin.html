<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  padding: 40px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>📦 Encomendas</h1>
<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load() {
  const lista = document.getElementById("lista");

  const snap = await getDocs(collection(db, "encomendas"));

  snap.forEach(docSnap => {
    const d = docSnap.data();

    lista.innerHTML += `
      <div class="card">
        <p><b>Cliente:</b> ${d.user}</p>
        <p><b>Total:</b> ${d.total}€</p>
        <p><b>Estado:</b> ${d.estado}</p>

        <ul>
          ${(d.produtos || []).map(p => `<li>${p.nome} - ${p.preco}€</li>`).join("")}
        </ul>

        <button onclick="enviado('${docSnap.id}')">Marcar Enviado</button>
      </div>
    `;
  });
}

window.enviado = async (id) => {
  await updateDoc(doc(db, "encomendas", id), {
    estado: "enviado"
  });

  location.reload();
};

load();

</script>

</body>
</html>
