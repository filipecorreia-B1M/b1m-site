<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregar() {
  try {
    const snapshot = await getDocs(collection(db, "encomendas"));
    console.log("Docs:", snapshot.size);

    const lista = document.getElementById("lista");

    snapshot.forEach(doc => {
      const data = doc.data();

      lista.innerHTML += `
        <div style="background:#1a1a1a;padding:20px;margin:20px;border-radius:10px;">
          <p><strong>${data.user}</strong></p>
          <p>Total: ${data.total}€</p>
        </div>
      `;
    });

  } catch (e) {
    alert("Erro: " + e.message);
  }
}

carregar();
</script>
