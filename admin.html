<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Admin B1M</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 40px;
}

h1 {
  margin-bottom: 30px;
}

.encomenda {
  background: #1a1a1a;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.item {
  color: #aaa;
}

.total {
  margin-top: 10px;
  font-weight: bold;
  color: gold;
}
</style>
</head>

<body>

<h1>📦 Encomendas B1M</h1>

<div id="lista"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC60rlpyK6bu0mkzysQItDU3TDKUCtTfic",
  authDomain: "montra-site.firebaseapp.com",
  projectId: "montra-site",
  storageBucket: "montra-site.firebasestorage.app",
  messagingSenderId: "816599981389",
  appId: "1:816599981389:web:b3210dbe4517be9dc5eb04"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregar() {
  const querySnapshot = await getDocs(collection(db, "encomendas"));
  const lista = document.getElementById("lista");

  querySnapshot.forEach(doc => {
    const data = doc.data();

    let html = `
      <div class="encomenda">
        <p><strong>Cliente:</strong> ${data.user}</p>
    `;

    data.cart.forEach(item => {
      html += `<div class="item">${item.nome} - ${item.preco}€</div>`;
    });

    html += `
        <div class="total">Total: ${data.total}€</div>
      </div>
    `;

    lista.innerHTML += html;
  });
}

carregar();
</script>

</body>
</html>
